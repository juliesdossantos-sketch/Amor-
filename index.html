<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julies ❤️ Diogo</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('fundo.jpg') no-repeat center center fixed;
  background-size: cover;
  text-align: center;
  color: white;
}

/* escurecer fundo */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

h1, h2 {
  font-family: 'Great Vibes', cursive;
}

/* título */
.titulo {
  opacity: 0;
  transform: translateY(-20px);
  animation: aparecerTitulo 2s forwards;
}

@keyframes aparecerTitulo {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.nome {
  color: #ff4d6d;
  font-weight: bold;
  font-size: 32px;
  text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
}

/* tela inicial */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff6b81;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff6b81;
  font-size: 16px;
  cursor: pointer;
}

/* carta */
.envelope {
  width: 300px;
  height: 200px;
  background: #ff6b81;
  margin: 40px auto;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff0f5;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  transform: translateY(100%);
  transition: 1s;
  color: #333;
  opacity: 0;
}

.envelope.open .letter {
  transform: translateY(0);
  opacity: 1;
}

/* fotos */
.gallery img {
  width: 90%;
  max-width: 250px;
  border-radius: 15px;
  margin: 10px;
}

/* letra */
#letra {
  max-width: 600px;
  margin: 30px auto;
  font-size: 18px;
  line-height: 1.8;
  text-align: left;
}

.linha {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s ease;
}

.linha.aparecer {
  opacity: 1;
  transform: translateY(0);
}

/* destaque com brilho */
.destaque {
  color: #ff4d6d;
  font-weight: bold;
  font-size: 20px;
  animation: brilho 2s infinite alternate;
}

@keyframes brilho {
  from { text-shadow: 0 0 5px #ff4d6d; }
  to { text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff99aa; }
}

/* botão surpresa */
.botao-surpresa {
  margin-top: 20px;
}

.mensagem-surpresa {
  margin-top: 15px;
  opacity: 0;
  transition: 0.5s;
}

/* corações */
.heart {
  position: fixed;
  bottom: -10px;
  animation: subir linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* ondas */
.ondas {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 200%;
  height: 120px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  animation: ondas 8s linear infinite;
}

@keyframes ondas {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* final */
.final {
  margin-top: 50px;
  margin-bottom: 40px;
}

.frase-final {
  font-size: 20px;
  opacity: 0;
  animation: aparecerFinal 2s forwards;
  animation-delay: 1s;
}

.assinatura {
  font-family: 'Great Vibes', cursive;
  font-size: 28px;
  color: #ffd1dc;
  opacity: 0;
  animation: aparecerFinal 2s forwards;
  animation-delay: 2s;
}

@keyframes aparecerFinal {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Tenho algo pra você 💖</h1>
  <button onclick="iniciar()">Clique aqui</button>
</div>

<h1 class="titulo">Para o meu amor, <span class="nome">Diogo</span> 💖</h1>

<div class="envelope" onclick="abrirCarta(this)">
  <div class="letter">
    <h3>Meu amor 💕</h3>
    <p id="texto"></p>
  </div>
</div>

<h2>Estamos juntos há ⏳</h2>
<p id="contador"></p>

<h2>Nossos momentos 📸</h2>
<div class="gallery">
  <img src="foto1.jpeg">
  <img src="foto2.jpeg">
  <img src="foto3.jpeg">
</div>

<button onclick="mostrarSurpresa()" class="botao-surpresa">
  Clique aqui se me ama 😳
</button>
<p id="mensagemSurpresa" class="mensagem-surpresa"></p>

<h2>🎶 Nossa música</h2>
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="letra"></div>

<div class="final">
  <p class="frase-final">Obrigada por fazer meus dias mais felizes 💖</p>
  <p class="assinatura">Com amor,<br>Julies 💕</p>
</div>

<div class="ondas"></div>

<script>
const mensagem = "Eu te amo diogo, hoje em dia sou muito feliz ao seu lado e continuaremos assim por muito tempo 💕, Obrigada por se tornar tão especial para mim.";

function iniciar() {
  document.getElementById('startScreen').style.display = 'none';
}

let jaAbriu = false;

function abrirCarta(el) {
  if (jaAbriu) return;
  jaAbriu = true;

  el.classList.add('open');

  let i = 0;
  const texto = document.getElementById('texto');

  function escrever() {
    if (i < mensagem.length) {
      texto.innerHTML += mensagem.charAt(i);
      i++;
      setTimeout(escrever, 40);
    }
  }

  setTimeout(escrever, 500);

  document.getElementById("musica").play();
  mostrarLetraCompleta();
}

const dataInicio = new Date("2026-02-08");

setInterval(() => {
  const dias = Math.floor((new Date() - dataInicio) / (1000*60*60*24));
  document.getElementById("contador").innerText = dias + " dias juntos 💕";
}, 1000);

function mostrarSurpresa() {
  const msg = document.getElementById("mensagemSurpresa");
  msg.innerText = "Eu te amo mais ainda 💕";
  msg.style.opacity = 1;
}

const letraCompleta = `... Talvez eu


Tenha perdido o juízo

Ninguém percebeu

Ninguém percebeu


Está ficando velho (eu meio que gostaria que você me ligasse)

Totalmente sozinha (porque cansei de me sentir solitária)

Devo ter perdido (eu preciso de uma conexão virtual)

Eu perdi (seja minha obsessão em vídeo)


Ninguém tentou

Ler meus olhos

Ninguém além de você

Queria que não fosse verdade


Talvez eu (eu meio que gostaria que você me ligasse)

Não está certo (porque cansei de ficar solitária)

Te fazer meu (eu preciso de uma conexão virtual)

Iremos com calma (seja minha obsessão em vídeo)


Vamos, não me deixe, não pode ser tão fácil, meu bem

Se você acredita em mim, acho que vou pegar um avião

Voar para a sua cidade, ansiosa para ver o seu rosto

Me abrace, me console, e então partirei sem deixar rastros


Vamos, não me deixe, não pode ser tão fácil, meu bem

<span class="destaque">Se você acredita em mim, acho que vou pegar um avião</span>

<span class="destaque">Voar para a sua cidade, ansiosa para ver o seu rosto</span>

<span class="destaque">Me abrace, me console, e então partirei sem deixar rastros</span>


Vamos, não me deixe, não pode ser tão fácil, meu bem

Se você acredita em mim, acho que vou pegar um avião

Voar para a sua cidade, ansiosa para ver o seu rosto

Me abrace, me console, e então partirei sem deixar rastros


(Talvez eu) vamos, não me deixe, não pode ser tão fácil, meu bem

(Não está certo) se você acredita em mim, acho que vou pegar um avião

(Te fazer meu) voar para a sua cidade, ansiosa para ver o seu rosto

(Iremos com calma) me abrace, me console, e então partirei sem deixar rastros


Eu meio que gostaria que você me ligasse

(Não está certo) porque cansei de ficar solitária

(Te fazer meu) eu preciso de uma conexão virtual
(Iremos com calma) seja minha obsessão em vídeo`;

// mantém seu sistema de linhas com efeito
function mostrarLetraCompleta() {
  const elemento = document.getElementById("letra");
  const linhas = letraCompleta.split("\\n");
  elemento.innerHTML = "";

  linhas.forEach((linha) => {
    const p = document.createElement("p");
    p.classList.add("linha");

    if (linha.includes("span")) {
      p.innerHTML = linha;
    } else {
      p.textContent = linha;
    }

    elemento.appendChild(p);
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("aparecer");
      }
    });
  });

  document.querySelectorAll(".linha").forEach(el => observer.observe(el));
}

// corações
setInterval(() => {
  const heart = document.createElement('div');
  heart.classList.add('heart');

  const simbolos = ['💖','💕','💗','💘','💞','💓','💌'];
  heart.innerHTML = simbolos[Math.floor(Math.random() * simbolos.length)];

  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (Math.random() * 3 + 3) + 's';

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
