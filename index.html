<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Julies ❤️ Diogo</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('fundo.jpg');
  background-size: cover;
  background-position: center;
  color: white;
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 20px;
  backdrop-filter: blur(10px);
}

/* título */
.titulo {
  font-family: 'Great Vibes';
  font-size: 40px;
  text-align: center;
}

.nome {
  color: #ff6b81;
  text-shadow: 0 0 15px rgba(255,100,120,0.8);
}

/* carta */
.envelope {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 20px;
  cursor: pointer;
  margin-top: 20px;
}

.letter {
  opacity: 0;
  transition: 1s;
}

.envelope.open .letter {
  opacity: 1;
}

/* contador */
#contador {
  text-align: center;
  font-size: 18px;
  margin: 15px 0;
}

/* galeria */
.gallery {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* modal zoom */
#modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
  animation: zoom 0.3s ease;
}

@keyframes zoom {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* botão */
.botao-surpresa {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #ff6b81;
  color: white;
  margin-top: 20px;
  font-size: 16px;
}

.mensagem-surpresa {
  margin-top: 10px;
}

/* letra */
#letra {
  margin-top: 30px;
  line-height: 1.8;
}

.linha {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.8s;
}

.linha.aparecer {
  opacity: 1;
  transform: translateY(0);
}

.destaque {
  color: #ff6b81;
  font-weight: bold;
  text-shadow: 0 0 10px #ff6b81;
}

/* assinatura */
.assinatura {
  font-family: 'Great Vibes';
  font-size: 30px;
  text-align: center;
  margin-top: 40px;
}

/* corações */
.heart {
  position: fixed;
  bottom: 0;
  animation: subir linear infinite;
}

@keyframes subir {
  100% {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

<h1 class="titulo">Para o meu amor, <span class="nome">Diogo</span> 💖</h1>

<div class="envelope" onclick="abrirCarta(this)">
  <div class="letter">
    <p id="texto"></p>
  </div>
</div>

<p id="contador"></p>

<h2>📸 Nossos momentos</h2>
<div class="gallery">
  <img src="foto1.jpeg" onclick="abrirImagem(this)">
  <img src="foto2.jpeg" onclick="abrirImagem(this)">
  <img src="foto3.jpeg" onclick="abrirImagem(this)">
</div>

<button onclick="mostrarSurpresa()" class="botao-surpresa">
Clique aqui se me ama 😳
</button>
<p id="mensagemSurpresa" class="mensagem-surpresa"></p>

<h2>🎶 Nossa música</h2>
<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<div id="letra"></div>

<p class="assinatura">Com amor,<br>Julies 💕</p>

</div>

<!-- modal zoom -->
<div id="modal" onclick="fecharImagem()">
  <img id="imgModal">
</div>

<script>
const mensagem = "Eu te amo diogo, hoje em dia sou muito feliz ao seu lado e continuaremos assim por muito tempo 💕, Obrigada por se tornar tão especial para mim.";

function abrirCarta(el){
  el.classList.add('open');
  document.getElementById("texto").innerText = mensagem;
  document.getElementById("musica").play();
  mostrarLetra();
}

const dataInicio = new Date("2026-02-08");

setInterval(()=>{
  const dias = Math.floor((new Date()-dataInicio)/(1000*60*60*24));
  document.getElementById("contador").innerText = dias + " dias juntos 💕";
},1000);

function mostrarSurpresa(){
  document.getElementById("mensagemSurpresa").innerText = "Eu te amo mais ainda 💖";
}

/* zoom imagem */
function abrirImagem(img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = img.src;
}

function fecharImagem(){
  document.getElementById("modal").style.display = "none";
}

/* letra */
const letraCompleta = `
<span class="destaque">Fly to your city</span><br>
Voar para sua cidade<br><br>

<span class="destaque">Excited to see your face</span><br>
Ansiosa para ver o seu rosto
`;

function mostrarLetra(){
  const el = document.getElementById("letra");
  el.innerHTML = letraCompleta;
}

/* corações */
setInterval(()=>{
  let h=document.createElement('div');
  h.classList.add('heart');
  h.innerHTML=['💖','💕','💗','💘'][Math.floor(Math.random()*4)];
  h.style.left=Math.random()*100+'vw';
  h.style.animationDuration=(Math.random()*3+3)+'s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},400);
</script>

</body>
</html>
