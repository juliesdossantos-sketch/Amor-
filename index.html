<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julies ❤️ Diogo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #ffc3a0);
  text-align: center;
  color: white;
}

h1 {
  margin-top: 30px;
  font-size: 28px;
}

/* CARTA */
.envelope {
  width: 300px;
  height: 200px;
  background: #ffb6c1;
  margin: 40px auto;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff0f5;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  transform: translateY(100%);
  transition: 0.8s;
  color: #333;
}

.envelope.open .letter {
  transform: translateY(0);
}

.gallery img {
  width: 90%;
  max-width: 250px;
  border-radius: 15px;
  margin: 10px;
}

iframe {
  margin-top: 20px;
  border-radius: 15px;
}

/* corações */
.heart {
  position: fixed;
  bottom: -10px;
  animation: subir 5s linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Julies ❤️ Diogo</h1>
<p>Clique na carta 💌</p>

<div class="envelope" onclick="abrirCarta(this)">
  <div class="letter">
    <h3>Meu amor 💕</h3>
    <p>
      Eu te amo diogo, hoje em dia sou muito feliz ao seu lado e continuaremos assim por muito tempo 💕,<br><br>
      Obrigada por se tornar tão especial para mim.
    </p>
  </div>
</div>

<h2>Nossos momentos 📸</h2>
<div class="gallery">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<h2>Nossa música 🎶</h2>
<iframe width="300" height="170" src="https://www.youtube.com/embed/_9hkXCYiEjc" allow="autoplay"></iframe>

<script>
function abrirCarta(el) {
  el.classList.toggle('open');
}

setInterval(() => {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = '💖';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
