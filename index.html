<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julies ❤️ Diogo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #ffc3a0);
  text-align: center;
  color: white;
  overflow-x: hidden;
}

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff6b81;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff6b81;
  font-size: 16px;
}

.envelope {
  width: 300px;
  height: 200px;
  background: #ff6b81;
  margin: 40px auto;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff0f5;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  transform: translateY(100%);
  transition: 1s;
  color: #333;
  opacity: 0;
}

.envelope.open .letter {
  transform: translateY(0);
  opacity: 1;
}

.gallery img {
  width: 90%;
  max-width: 250px;
  border-radius: 15px;
  margin: 10px;
}

.heart {
  position: fixed;
  bottom: -10px;
  animation: subir 5s linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

#letra {
  margin: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>Tenho algo pra você 💖</h1>
  <button onclick="iniciar()">Clique aqui</button>
</div>

<h1>Julies ❤️ Diogo</h1>
<p>Abra a carta 💌</p>

<div class="envelope" onclick="abrirCarta(this)">
  <div class="letter">
    <h3>Meu amor 💕</h3>
    <p id="texto"></p>
  </div>
</div>

<h2>Estamos juntos há ⏳</h2>
<p id="contador"></p>

<h2>Nossos momentos 📸</h2>
<div class="gallery">
  <img src="foto1.jpeg">
  <img src="foto2.jpeg">
  <img src="foto3.jpeg">
</div>

<h2>Nossa música 🎶</h2>
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<h2>🎶 Tradução</h2>
<p id="letra"></p>

<script>
const mensagem = "Eu te amo diogo, hoje em dia sou muito feliz ao seu lado e continuaremos assim por muito tempo 💕, Obrigada por se tornar tão especial para mim.";

function iniciar() {
  document.getElementById('startScreen').style.display = 'none';
}

let jaAbriu = false;

function abrirCarta(el) {
  if (jaAbriu) return;
  jaAbriu = true;

  el.classList.add('open');

  let i = 0;
  const texto = document.getElementById('texto');
  texto.innerHTML = "";

  function escrever() {
    if (i < mensagem.length) {
      texto.innerHTML += mensagem.charAt(i);
      i++;
      setTimeout(escrever, 40);
    }
  }

  setTimeout(escrever, 500);

  document.getElementById("musica").play();
  mostrarLetra();
}

const dataInicio = new Date("2026-02-08");

function atualizarContador() {
  const hoje = new Date();
  const diff = hoje - dataInicio;
  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  document.getElementById("contador").innerText = dias + " dias juntos 💕";
}

setInterval(atualizarContador, 1000);

const letraMusica = [
  "Maybe I","Talvez eu","",
  "Lost my mind","Tenha perdido o juízo","",
  "No one noticed","Ninguém percebeu","",
  "No one noticed","Ninguém percebeu","",
  "It's getting old","Está ficando velho","",
  "All alone","Totalmente sozinha","",
  "May have lost it","Devo ter perdido","",
  "I have lost it","Eu perdi","",
  "No one tried","Ninguém tentou","",
  "To read my eyes","Ler meus olhos","",
  "No one but you","Ninguém além de você","",
  "Wish it weren't true","Queria que não fosse verdade","",
  "Maybe I","Talvez eu","",
  "It's not right","Não está certo","",
  "Make you mine","Te fazer meu","",
  "Take our time","Iremos com calma","",
  "Come on, don't leave me","Vamos, não me deixe","",
  "It can't be that easy, babe","Não pode ser tão fácil, meu bem","",
  "If you believe me","Se você acredita em mim","",
  "I'll get on a plane","Acho que vou pegar um avião","",
  "Fly to your city","Voar para a sua cidade","",
  "Excited to see your face","Ansiosa para ver o seu rosto","",
  "Hold me, console me","Me abrace, me console","",
  "Then I'll leave without a trace","E então partirei sem deixar rastros","",
  "I'd kinda like it if you'd call me","Eu meio que gostaria que você me ligasse","",
  "'Cause I'm so over bein' lonely","Porque cansei de ficar solitária","",
  "I need a virtual connection","Eu preciso de uma conexão virtual","",
  "Be my video obsession","Seja minha obsessão em vídeo"
];

let linha = 0;

function mostrarLetra() {
  const elemento = document.getElementById("letra");

  function escreverLinha() {
    if (linha < letraMusica.length) {
      elemento.innerHTML = letraMusica[linha];
      linha++;
      setTimeout(escreverLinha, 2500);
    }
  }

  escreverLinha();
}

setInterval(() => {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = '💖';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
