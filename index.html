<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julies ❤️ Diogo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #ffc3a0);
  text-align: center;
  color: white;
  overflow-x: hidden;
}

h1 {
  margin-top: 30px;
  font-size: 28px;
}

/* ENVELOPE */
.envelope {
  width: 300px;
  height: 200px;
  background: #ff6b81;
  margin: 40px auto;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s;
}

.envelope:hover {
  transform: scale(1.05);
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fff0f5;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  transform: translateY(100%);
  transition: 1s;
  color: #333;
  opacity: 0;
}

.envelope.open .letter {
  transform: translateY(0);
  opacity: 1;
}

/* TEXTO ANIMADO */
.typing {
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid #ff4d6d;
  width: 0;
  animation: typing 4s steps(60, end) forwards;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

.gallery img {
  width: 90%;
  max-width: 250px;
  border-radius: 15px;
  margin: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

iframe {
  margin-top: 20px;
  border-radius: 15px;
}

/* CORAÇÕES */
.heart {
  position: fixed;
  bottom: -10px;
  animation: subir 5s linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

.footer {
  margin: 40px 10px;
  font-size: 18px;
  opacity: 0.9;
}
</style>
</head>

<body>

<h1>Julies ❤️ Diogo</h1>
<p>Abra a carta 💌</p>

<div class="envelope" onclick="abrirCarta(this)">
  <div class="letter">
    <h3>Meu amor 💕</h3>
    <p id="texto" class="typing"></p>
  </div>
</div>

<h2>Nossos momentos 📸</h2>
<div class="gallery">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<h2>Nossa música 🎶</h2>
<iframe width="300" height="170" src="https://www.youtube.com/embed/_9hkXCYiEjc?enablejsapi=1" allow="autoplay"></iframe>

<div class="footer">
  💕 Obrigada por existir e por escolher ficar.<br>
  Eu te amo 💖
</div>

<script>
const mensagem = "Eu te amo diogo, hoje em dia sou muito feliz ao seu lado e continuaremos assim por muito tempo 💕, Obrigada por se tornar tão especial para mim.";

function abrirCarta(el) {
  el.classList.toggle('open');

  let i = 0;
  const texto = document.getElementById('texto');
  texto.innerHTML = "";

  function escrever() {
    if (i < mensagem.length) {
      texto.innerHTML += mensagem.charAt(i);
      i++;
      setTimeout(escrever, 40);
    }
  }

  escrever();
}

// corações
setInterval(() => {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = '💖';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
